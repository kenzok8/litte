name: All plugins build

on:
  workflow_dispatch:
    inputs:
      plugins:
        description: '输入: 留空=全部, 1=最近1天更新, 2=最近2天更新, 或插件名(空格分隔)'
        required: false
        default: ''

jobs:
  build:
    name: build ${{ matrix.arch }}-${{ matrix.sdk }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sdk:
          - 24.10.4
          - 25.12.0
        arch:
          - aarch64_cortex-a53
          - aarch64_cortex-a72
          - aarch64_generic
          - arm_cortex-a15_neon-vfpv4
          - arm_cortex-a5_vfpv4
          - arm_cortex-a7
          - arm_cortex-a7_neon-vfpv4
          - arm_cortex-a8_vfpv3
          - arm_cortex-a9
          - arm_cortex-a9_neon
          - arm_cortex-a9_vfpv3-d16
          - arm_fa526
          - i386_pentium-mmx
          - i386_pentium4
          - mips64_octeonplus
          - mips_24kc
          - mips_4kec
          - mips_mips32
          - mipsel_24kc
          - mipsel_24kc_24kf
          - mipsel_74kc
          - mipsel_mips32
          - x86_64
        exclude:
          - sdk: 25.12.0
            arch: mips_4kec

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Get packages to build
        id: packages
        run: |
          input="${{ github.event.inputs.plugins }}"
          
          if [ -z "$input" ] || [ "$input" == "*" ]; then
            # 编译所有包
            PACKAGES=$(find . -maxdepth 1 -type d ! -name '.' ! -name '.git' ! -name '.github' -printf '%f ' | sed 's/ $//')
            echo "编译所有包: $PACKAGES"
            echo "packages=$PACKAGES" >> $GITHUB_OUTPUT
          elif [ "$input" == "1" ]; then
            # 最近1天有更新的包
            SINCE_DAYS=1
            echo "编译最近 $SINCE_DAYS 天更新的包..."
            PACKAGES=$(git log --since="${SINCE_DAYS} days ago" --name-only --pretty=format: | grep -v '^$' | awk -F'/' '{print $1}' | sort -u | grep -v '^\.\|^$' | tr '\n' ' ' | sed 's/ $//')
            echo "最近1天更新的包: $PACKAGES"
            echo "packages=$PACKAGES" >> $GITHUB_OUTPUT
          elif [ "$input" == "2" ]; then
            # 最近2天有更新的包
            SINCE_DAYS=2
            echo "编译最近 $SINCE_DAYS 天更新的包..."
            PACKAGES=$(git log --since="${SINCE_DAYS} days ago" --name-only --pretty=format: | grep -v '^$' | awk -F'/' '{print $1}' | sort -u | grep -v '^\.\|^$' | tr '\n' ' ' | sed 's/ $//')
            echo "最近2天更新的包: $PACKAGES"
            echo "packages=$PACKAGES" >> $GITHUB_OUTPUT
          else
            # 编译指定包
            echo "编译指定包: $input"
            echo "packages=$input" >> $GITHUB_OUTPUT
          fi

      - name: Build
        uses: kenzok8/gh-action-sdk@nohash
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.sdk }}
          FEEDNAME: packages_ci
          PACKAGES: ${{ steps.packages.outputs.packages }}
          NO_REFRESH_CHECK: true
          IGNORE_ERRORS: true
          INDEX: 1

      - name: Store packages
        uses: actions/upload-artifact@v7.0.0
        with:
          name: ${{ matrix.arch }}-${{ matrix.sdk }}
          path: |
            bin/packages/${{ matrix.arch }}/packages_ci/*.ipk
            bin/packages/${{ matrix.arch }}/packages_ci/*.apk

      - name: Zip packages
        run: |
          shopt -s nullglob
          packages=(bin/packages/${{ matrix.arch }}/packages_ci/*.ipk bin/packages/${{ matrix.arch }}/packages_ci/*.apk)
          if [ "${#packages[@]}" -eq 0 ]; then
            echo "No packages found"
            exit 1
          fi
          tar -zcvf ${{ matrix.arch }}-${{ matrix.sdk }}.tar.gz "${packages[@]}"
          mkdir -p release-assets
          cp "${packages[@]}" release-assets/
          cp ${{ matrix.arch }}-${{ matrix.sdk }}.tar.gz release-assets/
          echo -e "**文件说明** 🙈:\n" >> release.txt
          input="${{ github.event.inputs.plugins }}"
          if [ -z "$input" ] || [ "$input" == "*" ]; then
            echo -e "1. 编译所有插件\n" >> release.txt
          elif [ "$input" == "1" ]; then
            echo -e "1. 编译最近1天更新的插件\n" >> release.txt
          elif [ "$input" == "2" ]; then
            echo -e "1. 编译最近2天更新的插件\n" >> release.txt
          else
            echo -e "1. 编译指定插件: $input\n" >> release.txt
          fi
          echo -e "2. OpenWrt 24.10 使用：\`opkg install *.ipk\`\n" >> release.txt
          echo -e "3. OpenWrt 25.12 使用：\`apk add --allow-untrusted ./*.apk\`\n" >> release.txt
          echo -e "4. 如果单独安装ssr与依赖，\`rm -rf {*passwall*,*bypass*}\`\n" >> release.txt

      - name: Upload packages
        uses: ncipollo/release-action@v1.21.0
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          artifacts: "release-assets/*"
          allowUpdates: true
          replacesArtifacts: true
          bodyFile: "release.txt"
          tag: ${{ github.run_number }}-${{ matrix.arch }}-${{ matrix.sdk }}
      - name: Remove old Releases
        env:
          GH_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          REPO: ${{ github.repository }}
          KEEP: "60"
        run: |
          set -euo pipefail
          mapfile -t tags < <(gh release list --repo "$REPO" --limit 200 --json tagName,createdAt --jq 'sort_by(.createdAt) | reverse | .[].tagName')
          total=${#tags[@]}
          if [ "$total" -le "$KEEP" ]; then
            echo "No old releases to delete ($total <= $KEEP)"
            exit 0
          fi
          for tag in "${tags[@]:$KEEP}"; do
            echo "Deleting $tag"
            gh release delete "$tag" --repo "$REPO" --yes --cleanup-tag || true
          done
