name: Test plugins build

on:
  workflow_dispatch:
    inputs:
      plugins:
        description: '输入要编译的插件名，空格分隔'
        required: true
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: build ${{ matrix.arch }}-${{ matrix.sdk }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sdk:
          - 24.10.2
        arch:
          - aarch64_cortex-a53
          - x86_64

    steps:
      - uses: actions/checkout@main
        with:
          fetch-depth: 0

      - name: Build
        uses: kenzok8/gh-action-sdk@hash
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.sdk }}
          FEEDNAME: packages_ci
          PACKAGES: ${{ github.event.inputs.plugins }}
          NO_REFRESH_CHECK: true
          IGNORE_ERRORS: true

      - name: Detect built ipk files
        id: detect_ipk
        run: |
          shopt -s nullglob
          files=(bin/packages/${{ matrix.arch }}/packages_ci/*.ipk)
          if [ ${#files[@]} -gt 0 ]; then
            echo "has_ipk=true" >> $GITHUB_OUTPUT
            printf '%s\n' "${files[@]}"
          else
            echo "has_ipk=false" >> $GITHUB_OUTPUT
            echo "No ipk output found for: ${{ github.event.inputs.plugins }}"
            echo "Host-only packages (for example gn) are expected to have no ipk artifacts."
          fi

      - name: Store packages
        if: steps.detect_ipk.outputs.has_ipk == 'true'
        uses: actions/upload-artifact@main
        with:
          name: ${{ matrix.arch }}-${{ matrix.sdk }}
          path: bin/packages/${{ matrix.arch }}/packages_ci/*.ipk

      - name: Zip packages
        if: steps.detect_ipk.outputs.has_ipk == 'true'
        run: |
          tar -zcvf ${{ matrix.arch }}-${{ matrix.sdk }}.tar.gz bin/packages/${{ matrix.arch }}/packages_ci/*.ipk
          echo -e "**文件说明** 🙈:\n" >> release.txt
          echo -e "1. 支持编译单个或者多个插件\n" >> release.txt
          echo -e "2. 手动启动编译:${{ github.event.inputs.plugins }}\n" >> release.txt
          echo -e "3. 使用方法:上传到openwrt设备的tmp目录，输入命令 \`opkg install *.ipk\`\n" >> release.txt
          echo -e "4. 如果单独安装ssr与依赖，\`rm -rf {*passwall*,*bypass*}\`\n" >> release.txt

      - name: Upload packages
        if: steps.detect_ipk.outputs.has_ipk == 'true'
        uses: ncipollo/release-action@main
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          artifacts: "${{ matrix.arch }}-${{ matrix.sdk }}.tar.gz,bin/packages/${{ matrix.arch }}/packages_ci/*.ipk"
          allowUpdates: true
          replacesArtifacts: true
          bodyFile: "release.txt"
          tag: ${{ github.run_number }}-${{ matrix.arch }}

      - name: Skip release for host-only packages
        if: steps.detect_ipk.outputs.has_ipk != 'true'
        run: |
          echo "Skip artifact/release upload because no ipk was produced."
    
