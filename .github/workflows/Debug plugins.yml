name: Debug plugins build

on:
  workflow_dispatch:
    inputs:
      plugins:
        description: '输入要编译的插件名，空格分隔'
        required: true
        default: ''
      arch:
        description: '架构'
        required: true
        default: 'x86_64'
      sdk:
        description: 'SDK 版本'
        required: true
        default: '24.10.4'

jobs:
  build:
    name: debug build ${{ github.event.inputs.arch }}-${{ github.event.inputs.sdk }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Build (strict)
        uses: kenzok8/gh-action-sdk@hash
        env:
          ARCH: ${{ github.event.inputs.arch }}-${{ github.event.inputs.sdk }}
          FEEDNAME: packages_ci
          PACKAGES: ${{ github.event.inputs.plugins }}
          NO_REFRESH_CHECK: true
          IGNORE_ERRORS: false
          INDEX: 1
          # Swap bundled Go 1.23 for self-maintained Go 1.26.3 (sing-box 1.13+ needs >= 1.24.7)
          GOLANG_REPO: https://github.com/kenzok8/golang
          GOLANG_BRANCH: '1.26'

      - name: Store packages
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: debug-${{ github.event.inputs.arch }}-${{ github.event.inputs.sdk }}
          path: |
            bin/packages/${{ github.event.inputs.arch }}/packages_ci/*.ipk
            bin/packages/${{ github.event.inputs.arch }}/packages_ci/*.apk
            logs/**
            *.log
            **/*.log
          if-no-files-found: ignore
